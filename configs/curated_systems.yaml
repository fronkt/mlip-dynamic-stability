    transition_T_K: null
    soft_mode_q: null
    ref: ceria stable fluorite at all T (control)
    notes: control within fluorite family

  # ---- Superionic ----
  - id: agi_bcc
    formula: AgI
    prototype: alpha-AgI
    space_group: Im-3m
    mp_id: null
    klass: superionic
    harmonic_stable: false
    finite_T_stable: true
    transition_T_K: 420
    soft_mode_q: null
    ref: alpha-AgI superionic above ~420 K; Ag sublattice molten, bcc I framework
    notes: extreme anharmonicity / diffusion; MD-distortion probe more apt than SSCHA

  # ---- Harmonically-stable controls (should be stable at all T for a correct model) ----
  - id: si_diamond
